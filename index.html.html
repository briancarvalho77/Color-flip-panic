<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Flip Panic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: radial-gradient(circle, #1a1a1a, #000);
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
  }

  #ui {
    position: absolute;
    top: 10px;
    width: 100%;
    z-index: 10;
  }

  #score { font-size: 22px; }
  #combo { font-size: 18px; color: gold; }
  #high { font-size: 16px; opacity: 0.7; }

  canvas {
    display: block;
  }

  #flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<div id="ui">
  <div id="score">Score: 0</div>
  <div id="combo">Combo: x1</div>
  <div id="high">High Score: 0</div>
</div>

<div id="flash"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const colors = ["#ff4d4d","#4da6ff","#4dff88","#ffd24d"];

let player = {
  x: canvas.width / 2,
  y: 130,
  size: 40,
  colorIndex: 0
};

let platforms = [];
let speed = 2.5;
let score = 0;
let combo = 1;
let comboTimer = 0;
let gameOver = false;

let highScore = localStorage.getItem("cfp_high") || 0;
document.getElementById("high").innerText = "High Score: " + highScore;

// PARTICLES
let particles = [];

function createParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30,
      color
    });
  }
}

// FLASH EFFECT
function flash() {
  const f = document.getElementById("flash");
  f.style.opacity = 0.6;
  setTimeout(() => f.style.opacity = 0, 80);
}

// PLATFORM
function createPlatform() {
  const width = 140;
  platforms.push({
    x: Math.random() * (canvas.width - width),
    y: canvas.height,
    width,
    height: 25,
    colorIndex: Math.floor(Math.random() * colors.length)
  });
}

// UPDATE LOOP
function update() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // PLAYER
  ctx.fillStyle = colors[player.colorIndex];
  ctx.shadowBlur = 20;
  ctx.shadowColor = colors[player.colorIndex];
  ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
  ctx.shadowBlur = 0;

  // PLATFORMS
  for (let i = platforms.length - 1; i >= 0; i--) {
    let p = platforms[i];
    p.y -= speed;

    ctx.fillStyle = colors[p.colorIndex];
    ctx.fillRect(p.x, p.y, p.width, p.height);

    // COLLISION
    if (
      player.y + player.size/2 > p.y &&
      player.y - player.size/2 < p.y + p.height &&
      player.x > p.x - 10 &&
      player.x < p.x + p.width + 10
    ) {
      if (player.colorIndex === p.colorIndex) {

        platforms.splice(i, 1);

        // SCORE + COMBO
        score += combo;
        combo++;
        comboTimer = 60;

        // RANDOM NEW COLOR
        let newColor;
        do {
          newColor = Math.floor(Math.random() * colors.length);
        } while (newColor === player.colorIndex);
        player.colorIndex = newColor;

        createParticles(player.x, player.y, colors[player.colorIndex]);
        flash();

        speed += 0.05;

        document.getElementById("score").innerText = "Score: " + score;
        document.getElementById("combo").innerText = "Combo: x" + combo;

      } else {
        endGame();
      }
    }

    if (p.y < -30) platforms.splice(i, 1);
  }

  // PARTICLES
  for (let i = particles.length - 1; i >= 0; i--) {
    let pt = particles[i];
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.life--;

    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x, pt.y, 4, 4);

    if (pt.life <= 0) particles.splice(i, 1);
  }

  // COMBO DECAY
  if (comboTimer > 0) {
    comboTimer--;
  } else {
    combo = 1;
    document.getElementById("combo").innerText = "Combo: x1";
  }

  requestAnimationFrame(update);
}

// SPAWN LOOP
setInterval(() => {
  if (!gameOver) createPlatform();
}, 700);

// MOVEMENT
function move(x) {
  player.x = x;
}

window.addEventListener("mousemove", e => move(e.clientX));
window.addEventListener("touchmove", e => move(e.touches[0].clientX));

// RESTART
window.addEventListener("click", () => {
  if (gameOver) resetGame();
});

function endGame() {
  gameOver = true;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("cfp_high", highScore);
  }

  document.getElementById("score").innerText =
    "Game Over! Score: " + score + " (Tap)";
}

// RESET
function resetGame() {
  platforms = [];
  particles = [];
  score = 0;
  combo = 1;
  speed = 2.5;
  gameOver = false;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("combo").innerText = "Combo: x1";
  document.getElementById("high").innerText = "High Score: " + highScore;
}

update();
</script>

</body>
</html>
